  M7 Design System v1.1 — Self-contained spec & dev handoff
  ──────────────────────────────────────────────────────────
  This is a single-file bundle. Open it in any browser — no server required.
  All scripts are inlined; the only external dependencies are:

       THEME BUILDER — builds a MUI-compatible theme object from tokens
       Source: project/tokens/theme-v2.js

  <script>
// M7 Design System — Theme Builder (v1.1)
window.M7ThemeBuilder = (function () {
  function buildTypography(T) {
    const s = T.type.scale;
    const fam = T.type.fontFamily;
    const famOf = (k) => k === 'display' ? fam.display : fam.body;
    const pack = (v) => ({
      fontFamily: famOf(v.family),
      fontWeight: v.w,
      fontSize: `${v.size}rem`,
      lineHeight: v.lh,
      letterSpacing: `${v.ls}em`,
    });
    const out = { fontFamily: fam.body, htmlFontSize: 16, fontSize: 14 };
    Object.keys(s).forEach(k => { out[k] = pack(s[k]); });
    out.button = { ...out.button, textTransform: 'none' };
    out.overline = { ...out.overline, textTransform: 'uppercase' };
    return out;
  }

  function buildTheme(opts) {
    const T = window.M7Tokens;
    const { neutralKey = 'brand-tinted', shiftKey = 'refined', mode = 'light' } = opts || {};
    const N = T.neutralScales[neutralKey];
    const S = T.shiftColorSets[shiftKey];
    const isDark = mode === 'dark';

    const surfaces = isDark
      ? { canvas: N[900], panel: N[800], raised: N[700], overlay: 'rgba(10,9,16,0.72)', subtle: N[800], hover: N[700], selected: T.brand.purple[900] }
      : { canvas: N[0], panel: N[0], raised: N[0], overlay: 'rgba(20,19,25,0.48)', subtle: N[50], hover: N[100], selected: T.brand.purple[50] };
    const text = isDark
      ? { primary: N[50], secondary: N[200], muted: N[400], disabled: N[500], inverse: N[900], onBrand: '#FFFFFF' }
      : { primary: N[900], secondary: N[700], muted: N[500], disabled: N[400], inverse: N[0], onBrand: '#FFFFFF' };
    const border = isDark
      ? { subtle: N[700], default: N[600], strong: N[500], brand: T.brand.purple[300], focus: T.brand.purple[300] }
      : { subtle: N[100], default: N[200], strong: N[300], brand: T.brand.purple[500], focus: T.brand.purple[500] };

    // Primary (purple) — main lifts from 500 → 300 in dark; dark flips lighter (tonal inversion)
    const primary = isDark
      ? { lighter: T.brand.purple[900], light: T.brand.purple[200], main: T.brand.purple[300], dark: T.brand.purple[100], contrastText: T.brand.purple[950] }
      : { lighter: T.brand.purple[50],  light: T.brand.purple[300], main: T.brand.purple[500], dark: T.brand.purple[700], contrastText: '#FFFFFF' };

    // Secondary (neutral) — inverts across modes; light in dark, dark in light
    const secondary = isDark
      ? { lighter: N[700], light: N[400], main: N[50],  dark: N[25],   contrastText: N[900] }
      : { lighter: N[100], light: N[300], main: N[900], dark: N[1000], contrastText: '#FFFFFF' };

    // Tertiary (green) — #CAF036 is already high-luminance; desaturate/shade back 1 stop on dark
    // so it doesn't vibrate. lighter flips to a deep tinted background.
    const tertiary = isDark
      ? { lighter: T.brand.green[900], light: T.brand.green[600], main: T.brand.green[300], dark: T.brand.green[100], contrastText: T.brand.green[950] }
      : { lighter: T.brand.green[50],  light: T.brand.green[200], main: T.brand.green[400], dark: T.brand.green[700], contrastText: '#1E163A' };

    const sem = isDark ? T.semanticsDark : T.semantics;

    return {
      palette: {
        mode,
        primary, secondary, tertiary,
        error: sem.error, warning: sem.warning, info: sem.info, success: sem.success,
        grey: { 50:N[50],100:N[100],200:N[200],300:N[300],400:N[400],500:N[500],600:N[600],700:N[700],800:N[800],900:N[900] },
        text: { primary: text.primary, secondary: text.secondary, disabled: text.disabled, muted: text.muted, inverse: text.inverse, main: text.primary },
        background: { default: surfaces.canvas, paper: surfaces.panel },
        divider: border.subtle,
      },
      typography: buildTypography(T),
      shape: { borderRadius: 8 },
      spacing: 4,
      shadows: (() => { const a = ['none', T.shadow.sm, T.shadow.md, T.shadow.lg, T.shadow.xl]; while (a.length < 25) a.push(T.shadow.xl); return a; })(),
      transitions: {
        duration: { shortest: 120, shorter: 120, short: 200, standard: 200, complex: 320, enteringScreen: 200, leavingScreen: 120 },
        easing: { easeInOut: T.motion.ease.standard, easeOut: T.motion.ease.out, easeIn: T.motion.ease.in, sharp: T.motion.ease.emphasized },
      },
      tokens: { neutrals: N, surfaces, text, border, radius: T.radius, shadow: T.shadow, motion: T.motion, spacing: T.spacing, shift: S },
    };
  }

  return { buildTheme };
})();
  </script>

  <script type="text/babel">
const { useState, useMemo, useEffect } = React;

function Section({ id, title, eyebrow, description, children, theme }) {
  const t = theme;
  return (
    <section id={id} style={{ padding: `${t.tokens.spacing[16]} ${t.tokens.spacing[10]}`, borderBottom: `1px solid ${t.tokens.border.subtle}` }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        {eyebrow && <div style={{ ...t.typography.overline, color: t.palette.primary.main, marginBottom: t.tokens.spacing[3] }}>{eyebrow}</div>}
        <h2 style={{ ...t.typography.h2, color: t.tokens.text.primary, margin: 0, marginBottom: description ? t.tokens.spacing[3] : t.tokens.spacing[10] }}>{title}</h2>
        {description && <p style={{ ...t.typography.body1, color: t.tokens.text.secondary, maxWidth: 720, marginTop: 0, marginBottom: t.tokens.spacing[10] }}>{description}</p>}
        {children}
      </div>
    </section>
  );
}

function TokenLabel({ name, value, theme }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}>
      <span style={{ ...theme.typography.xSmall, color: theme.tokens.text.primary, fontFamily: 'ui-monospace, monospace' }}>{name}</span>
      <span style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, fontFamily: 'ui-monospace, monospace' }}>{value}</span>
    </div>
  );
}

// Pick readable text ("#FFFFFF" or "#141319") for a given background color.
// Uses WCAG relative luminance; threshold tuned so mid-tone colors pick white.
function pickContrast(bg) {
  if (!bg || typeof bg !== 'string') return '#141319';
  let hex = bg.trim();
  if (hex.startsWith('rgb')) return '#141319';
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  if (hex.length !== 6) return '#141319';
  const r = parseInt(hex.slice(0, 2), 16) / 255;
  const g = parseInt(hex.slice(2, 4), 16) / 255;
  const b = parseInt(hex.slice(4, 6), 16) / 255;
  const lin = (c) => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  const L = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
  // Contrast vs white = 1.05 / (L + 0.05); vs #141319 (L≈0.0055) ≈ (L + 0.05) / 0.0555
  const contrastWhite = 1.05 / (L + 0.05);
  const contrastBlack = (L + 0.05) / 0.0555;
  return contrastWhite >= contrastBlack ? '#FFFFFF' : '#141319';
}

function Swatch({ color, name, value, theme, large, onBrand }) {
  const size = large ? 120 : 72;
  const fg = onBrand || pickContrast(color);
  return (
    <div style={{ width: '100%' }}>
      <div style={{ height: size, background: color, borderRadius: theme.tokens.radius.md, border: `1px solid ${theme.tokens.border.subtle}`, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: fg, ...theme.typography.smallBold }}>Aa</div>
      </div>
      <div style={{ marginTop: theme.tokens.spacing[2] }}>
        <div style={{ ...theme.typography.small, color: theme.tokens.text.primary, fontWeight: 500 }}>{name}</div>
        <div style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, fontFamily: 'ui-monospace, monospace' }}>{value}</div>
      </div>
    </div>
  );
}

function Button({ variant = 'contained', color = 'primary', size = 'medium', disabled, children, startIcon, endIcon, theme, fullWidth, style, onClick }) {
  const pal = theme.palette[color] || theme.palette.primary;
  const heights = { small: 30, medium: 36, large: 42 };
  const px = { small: 10, medium: 16, large: 22 };
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    height: heights[size], padding: `0 ${px[size]}px`,
    borderRadius: theme.tokens.radius.sm,
    fontFamily: theme.typography.fontFamily, fontSize: size === 'small' ? '0.8125rem' : '0.875rem', fontWeight: 500,
    cursor: disabled ? 'not-allowed' : 'pointer', textTransform: 'none',
    transition: `all ${theme.tokens.motion.duration.fast} ${theme.tokens.motion.ease.standard}`,
    border: '1px solid transparent', opacity: disabled ? 0.5 : 1,
    width: fullWidth ? '100%' : undefined, whiteSpace: 'nowrap', ...style,
  };
  const variants = {
    contained: { background: pal.main, color: pal.contrastText, boxShadow: theme.tokens.shadow.sm },
    outlined: { background: 'transparent', color: pal.main, borderColor: pal.main },
    text: { background: 'transparent', color: pal.main },
    soft: { background: pal.lighter || theme.tokens.surfaces.subtle, color: pal.dark || pal.main },
  };
  const iconWrap = (slot) => slot ? (
    <span style={{ display: 'inline-flex', alignItems: 'center', color: 'inherit' }} aria-hidden="true">{slot}</span>
  ) : null;
  return (
    <button style={{ ...base, ...variants[variant] }} disabled={disabled} onClick={onClick}>
      {iconWrap(startIcon)}{children}{iconWrap(endIcon)}
    </button>
  );
}

const Icon = {
  plus: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  arrowRight: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10m-4-4l4 4-4 4" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  check: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3L13 5" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  close: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  search: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke={c} strokeWidth="1.6"/><path d="M10.5 10.5L14 14" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  warn: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l7 12H1L8 2z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/><path d="M8 7v3M8 12v.01" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  info: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke={c} strokeWidth="1.6"/><path d="M8 7v4M8 5v.01" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  tweaks: (c='currentColor') => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 8h6M7 12h2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

function Chip({ label, color = 'default', variant = 'filled', size = 'medium', onDelete, theme, icon }) {
  const palMap = {
    default: { bg: theme.tokens.surfaces.subtle, fg: theme.tokens.text.primary, border: theme.tokens.border.default },
    primary: { bg: theme.palette.primary.lighter, fg: theme.palette.primary.dark, border: theme.palette.primary.light },
    success: { bg: theme.palette.success.lighter, fg: theme.palette.success.dark, border: theme.palette.success.light },
    warning: { bg: theme.palette.warning.lighter, fg: theme.palette.warning.dark, border: theme.palette.warning.light },
    error:   { bg: theme.palette.error.lighter,   fg: theme.palette.error.dark,   border: theme.palette.error.light },
    info:    { bg: theme.palette.info.lighter,    fg: theme.palette.info.dark,    border: theme.palette.info.light },
  };
  const p = palMap[color] || palMap.default;
  const h = size === 'small' ? 22 : 28;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6, height: h, padding: `0 ${size === 'small' ? 8 : 10}px`,
      borderRadius: theme.tokens.radius.pill,
      background: variant === 'outlined' ? 'transparent' : p.bg,
      color: p.fg, border: variant === 'outlined' ? `1px solid ${p.border}` : '1px solid transparent',
      ...theme.typography.small, fontSize: size === 'small' ? '0.75rem' : '0.8125rem', fontWeight: 500, whiteSpace: 'nowrap',
    }}>
      {icon}{label}
      {onDelete && <span style={{ cursor: 'pointer', display: 'flex', opacity: 0.7 }}>{Icon.close(p.fg)}</span>}
    </span>
  );
}

function TextField({ label, placeholder, value, helperText, error, disabled, theme, startAdornment, endAdornment, fullWidth, size = 'medium' }) {
  const [focused, setFocused] = useState(false);
  const h = size === 'small' ? 36 : 42;
  const borderColor = error ? theme.palette.error.main : focused ? theme.palette.primary.main : theme.tokens.border.default;
  return (
    <div style={{ width: fullWidth ? '100%' : 240 }}>
      {label && <label style={{ ...theme.typography.small, color: theme.tokens.text.secondary, display: 'block', marginBottom: 6, fontWeight: 500 }}>{label}</label>}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8, height: h, padding: '0 12px',
        background: disabled ? theme.tokens.surfaces.subtle : theme.tokens.surfaces.panel,
        border: `1px solid ${borderColor}`, borderRadius: theme.tokens.radius.sm,
        boxShadow: focused ? `0 0 0 3px ${theme.palette.primary.main}20` : 'none',
        transition: `all ${theme.tokens.motion.duration.fast} ${theme.tokens.motion.ease.standard}`, opacity: disabled ? 0.6 : 1,
      }}>
        {startAdornment}
        <input defaultValue={value} placeholder={placeholder} disabled={disabled}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: theme.typography.fontFamily, fontSize: '0.875rem', color: theme.tokens.text.primary, minWidth: 0 }}
        />
        {endAdornment}
      </div>
      {helperText && <div style={{ ...theme.typography.xSmall, color: error ? theme.palette.error.main : theme.tokens.text.muted, marginTop: 6 }}>{helperText}</div>}
    </div>
  );
}

function Switch({ checked: initial = false, disabled, theme, label }) {
  const [checked, setChecked] = useState(initial);
  const on = checked && !disabled;
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1 }}>
      <span onClick={() => !disabled && setChecked(!checked)} style={{
        width: 36, height: 20, borderRadius: 999,
        background: on ? theme.palette.primary.light : theme.tokens.border.strong, position: 'relative',
        transition: `background ${theme.tokens.motion.duration.fast} ${theme.tokens.motion.ease.standard}`,
      }}>
        <span style={{ position: 'absolute', top: 2, left: on ? 18 : 2, width: 16, height: 16, borderRadius: 999,
          background: on ? theme.palette.primary.main : '#fff', boxShadow: theme.tokens.shadow.sm,
          transition: `left ${theme.tokens.motion.duration.fast} ${theme.tokens.motion.ease.standard}` }}/>
      </span>
      {label && <span style={{ ...theme.typography.small, color: theme.tokens.text.primary }}>{label}</span>}
    </label>
  );
}

function Checkbox({ checked: initial = false, disabled, theme, label }) {
  const [checked, setChecked] = useState(initial);
  const on = checked && !disabled;
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1 }}>
      <span onClick={() => !disabled && setChecked(!checked)} style={{
        width: 18, height: 18, borderRadius: theme.tokens.radius.xs,
        background: on ? theme.palette.primary.main : 'transparent',
        border: `1.5px solid ${on ? theme.palette.primary.main : theme.tokens.border.strong}`,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        transition: `all ${theme.tokens.motion.duration.fast} ${theme.tokens.motion.ease.standard}`,
      }}>
        {on && <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3L13 5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </span>
      {label && <span style={{ ...theme.typography.small, color: theme.tokens.text.primary }}>{label}</span>}
    </label>
  );
}

function Radio({ checked, disabled, theme, label }) {
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1 }}>
      <span style={{ width: 18, height: 18, borderRadius: 999, border: `1.5px solid ${checked ? theme.palette.primary.main : theme.tokens.border.strong}`, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
        {checked && <span style={{ width: 10, height: 10, borderRadius: 999, background: theme.palette.primary.main }}/>}
      </span>
      {label && <span style={{ ...theme.typography.small, color: theme.tokens.text.primary }}>{label}</span>}
    </label>
  );
}

function Alert({ severity = 'info', title, children, theme, variant = 'standard' }) {
  const map = {
    success: { pal: theme.palette.success, icon: Icon.check },
    warning: { pal: theme.palette.warning, icon: Icon.warn },
    error: { pal: theme.palette.error, icon: Icon.warn },
    info: { pal: theme.palette.info, icon: Icon.info },
  };
  const { pal, icon } = map[severity];
  const filled = variant === 'filled';
  return (
    <div style={{ display: 'flex', gap: 12, padding: '12px 14px', borderRadius: theme.tokens.radius.md,
      background: filled ? pal.main : pal.lighter, color: filled ? pal.contrastText : pal.dark,
      border: filled ? 'none' : `1px solid ${pal.light}` }}>
      <div style={{ flexShrink: 0, marginTop: 2 }}>{icon(filled ? pal.contrastText : pal.dark)}</div>
      <div>
        {title && <div style={{ ...theme.typography.smallBold, marginBottom: 2 }}>{title}</div>}
        <div style={{ ...theme.typography.small }}>{children}</div>
      </div>
    </div>
  );
}

function Card({ children, theme, padding = 16, elevated }) {
  return (
    <div style={{ background: theme.tokens.surfaces.panel, border: `1px solid ${theme.tokens.border.subtle}`,
      borderRadius: theme.tokens.radius.lg, padding, boxShadow: elevated ? theme.tokens.shadow.md : 'none' }}>
      {children}
    </div>
  );
}

function TooltipDemo({ theme, children, label }) {
  return (
    <div style={{ position: 'relative', display: 'inline-block' }}>
      {children}
      <div style={{ position: 'absolute', bottom: 'calc(100% + 8px)', left: '50%', transform: 'translateX(-50%)',
        background: theme.tokens.neutrals[900], color: '#fff', padding: '4px 8px', borderRadius: theme.tokens.radius.xs,
        fontSize: '0.6875rem', whiteSpace: 'nowrap' }}>
        {label}
        <div style={{ position: 'absolute', top: '100%', left: '50%', transform: 'translateX(-50%)', width: 0, height: 0,
          borderLeft: '4px solid transparent', borderRight: '4px solid transparent', borderTop: `4px solid ${theme.tokens.neutrals[900]}` }}/>
      </div>
    </div>
  );
}

Object.assign(window, { Section, TokenLabel, Swatch, Button, Icon, Chip, TextField, Switch, Checkbox, Radio, Alert, Card, TooltipDemo, pickContrast });
  </script>

  <script type="text/babel">
function FoundationsColor({ theme }) {
  const N = theme.tokens.neutrals;
  const T = window.M7Tokens;
  const purpleStops = [50,100,200,300,400,500,600,700,800,900,950];

  const neutralOrder = [0, 25, 50, 100, 150, 200, 300, 400, 500, 600, 700, 800, 900, 1000];
  const sp = theme.tokens.spacing;

  const roleMapFor = (pal, scale) => {
    const map = {};
    ['lighter', 'light', 'main', 'dark'].forEach(role => {
      const hex = (pal[role] || '').toLowerCase();
      const match = Object.entries(scale).find(([, v]) => String(v).toLowerCase() === hex);

  const FullScale = ({ title, eyebrow, stops, get, roleMap, accent, note }) => (

          <h3 style={{ ...theme.typography.h4, color: theme.tokens.text.primary, margin: 0 }}>{title}</h3>
        </div>
        {note && <span style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, fontFamily: 'ui-monospace, monospace' }}>{note}</span>}

                outline: isMain ? `2px solid ${theme.tokens.surfaces.panel}` : 'none', outlineOffset: -4,
                opacity: isRoled || !roleMap ? 1 : 0.92,

              <div style={{ marginTop: sp[2] }}>
                <div style={{ ...theme.typography.small, color: theme.tokens.text.primary, fontWeight: isMain ? 700 : 500, fontFamily: 'ui-monospace, monospace' }}>{k}</div>
                <div style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, fontFamily: 'ui-monospace, monospace' }}>{v}</div>
              </div>
              {isRoled && (

              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  const FourStopGrid = ({ keys }) => (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: sp[6] }}>
      {keys.map(key => {
        const pal = theme.palette[key];
        return (
          <div key={key}>
            <h4 style={{ ...theme.typography.h6, color: theme.tokens.text.primary, margin: 0, marginBottom: sp[3], textTransform: 'capitalize' }}>{key}</h4>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: sp[2] }}>
              <Swatch name="lighter" value={pal.lighter} color={pal.lighter} theme={theme} />
              <Swatch name="light" value={pal.light} color={pal.light} theme={theme} />
              <Swatch name="main" value={pal.main} color={pal.main} theme={theme} />
              <Swatch name="dark" value={pal.dark} color={pal.dark} theme={theme} />
            </div>
          </div>
        );
      })}
    </div>
  );

  return (
    <Section id="color" eyebrow="Foundations" title="Color" theme={theme}
      description="Full 10-stop scales for the three brand colors (Primary · Tertiary) plus a 14-stop neutral scale. Every branded and semantic role also exposes a 4-stop ramp — lighter / light / main / dark — mapped from the full scales for use in UI tokens.">

      <FullScale title="Primary · Purple" eyebrow="Brand · 10 stops" stops={purpleStops} get={k => T.brand.purple[k]} roleMap={roleMapFor(theme.palette.primary, T.brand.purple)} accent={theme.palette.primary.main} note={theme.palette.mode === 'dark' ? 'dark mode · main lifts to purple.300' : 'main → purple.500 · #5B43AC'} />
      <FullScale title="Tertiary · Green" eyebrow="Brand · 10 stops" stops={greenStops} get={k => T.brand.green[k]} roleMap={roleMapFor(theme.palette.tertiary, T.brand.green)} accent={T.brand.green[600]} note={theme.palette.mode === 'dark' ? 'dark mode · main steps back to green.300' : '$brandGreen #CAF036 → green.400'} />
      <FullScale title="Neutrals" eyebrow="14 stops · 0 → 1000" stops={neutralOrder} get={k => N[k]} accent={theme.tokens.text.muted} note="Linear-inspired · brand-tinted by default" />

      <div style={{ marginBottom: sp[10], display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: sp[6], alignItems: 'stretch' }}>
        <Card theme={theme} padding={sp[6]}>
          <div style={{ ...theme.typography.overline, color: theme.palette.primary.main, marginBottom: sp[2] }}>Pattern · 4 stops</div>
          <h3 style={{ ...theme.typography.h4, margin: 0, marginBottom: sp[3] }}>lighter · light · main · dark</h3>
          <p style={{ ...theme.typography.body2, color: theme.tokens.text.secondary, margin: 0, marginBottom: sp[4] }}>
            Every branded and semantic color role carries four stops so any surface — chip, alert, soft button, badge — can be composed from tokens alone, without one-off hex values. The four stops are sampled from the full 10-stop scales above.
          </p>

            <span style={{ color: theme.tokens.text.secondary }}>Tinted backgrounds — chip fills, alert backgrounds, soft button, hover on colored surfaces.</span>
            <span style={{ fontFamily: 'ui-monospace, monospace', color: theme.tokens.text.primary, fontWeight: 600 }}>light</span>
            <span style={{ color: theme.tokens.text.secondary }}>Borders and dividers on tinted surfaces. Disabled states of <code style={{ fontFamily: 'ui-monospace, monospace' }}>main</code>.</span>
            <span style={{ fontFamily: 'ui-monospace, monospace', color: theme.tokens.text.primary, fontWeight: 600 }}>main</span>
            <span style={{ color: theme.tokens.text.secondary }}>The canonical color — filled buttons, icons, active text.</span>
            <span style={{ fontFamily: 'ui-monospace, monospace', color: theme.tokens.text.primary, fontWeight: 600 }}>dark</span>
            <span style={{ color: theme.tokens.text.secondary }}>Text on <code style={{ fontFamily: 'ui-monospace, monospace' }}>lighter</code> backgrounds (WCAG AA). Hover/pressed state of <code style={{ fontFamily: 'ui-monospace, monospace' }}>main</code>.</span>
          </div>
        </Card>
        <Card theme={theme} padding={sp[6]}>
          <div style={{ ...theme.typography.overline, color: theme.palette.warning.dark, marginBottom: sp[2] }}>Custom extension</div>
          <h3 style={{ ...theme.typography.h4, margin: 0, marginBottom: sp[3] }}>MUI v5 only ships 3 stops</h3>
          <p style={{ ...theme.typography.body2, color: theme.tokens.text.secondary, margin: 0, marginBottom: sp[4] }}>
            MUI's <code style={{ fontFamily: 'ui-monospace, monospace' }}>PaletteColor</code> defines <code style={{ fontFamily: 'ui-monospace, monospace' }}>light / main / dark / contrastText</code>. We extend it with <code style={{ fontFamily: 'ui-monospace, monospace' }}>lighter</code> and add <code style={{ fontFamily: 'ui-monospace, monospace' }}>tertiary</code> as a first-class palette role. Both require module augmentation in <code style={{ fontFamily: 'ui-monospace, monospace' }}>theme.ts</code>:
          </p>
          <pre style={{ margin: 0, padding: sp[4], background: theme.tokens.neutrals[900], color: theme.tokens.neutrals[100], borderRadius: theme.tokens.radius.sm, fontFamily: 'ui-monospace, monospace', fontSize: 12, lineHeight: 1.55, overflow: 'auto' }}>{`declare module "@mui/material/styles" {
  interface PaletteColor {
    lighter?: string;
  }
  interface SimplePaletteColorOptions {
    lighter?: string;
  }
  interface Palette {
    tertiary: PaletteColor;
  }
  interface PaletteOptions {
    tertiary?: PaletteColorOptions;
  }
}`}</pre>
        </Card>
      </div>

      <div style={{ marginBottom: sp[10] }}>
        <h3 style={{ ...theme.typography.h5, color: theme.tokens.text.primary, margin: 0, marginBottom: sp[4] }}>Branded roles · 4-stop</h3>
        <FourStopGrid keys={['primary', 'secondary', 'tertiary']} />
      </div>

      <div style={{ marginBottom: sp[10] }}>
        <h3 style={{ ...theme.typography.h5, color: theme.tokens.text.primary, margin: 0, marginBottom: sp[4] }}>Semantic roles · 4-stop</h3>
        <FourStopGrid keys={['success', 'warning', 'error', 'info']} />
      </div>

      <Card theme={theme} padding={sp[6]} style={{ marginBottom: sp[10] }}>
        <div style={{ ...theme.typography.overline, color: theme.palette.tertiary.dark, marginBottom: sp[2] }}>Dark mode · Light-shifting</div>
        <h3 style={{ ...theme.typography.h4, margin: 0, marginBottom: sp[3] }}>`main` lifts ~2 stops lighter on dark surfaces</h3>
        <p style={{ ...theme.typography.body2, color: theme.tokens.text.secondary, margin: 0, marginBottom: sp[4], maxWidth: 720 }}>
          Saturated mid-tones muddy against dark backgrounds and fail WCAG AA as text. Following Material 3, Linear, and Primer, every branded and semantic role remaps its 4 stops in dark mode — <code style={{ fontFamily: 'ui-monospace, monospace' }}>main</code> lifts 2 stops, <code style={{ fontFamily: 'ui-monospace, monospace' }}>lighter</code> flips to a deep tinted surface, and <code style={{ fontFamily: 'ui-monospace, monospace' }}>dark</code> inverts so hover/pressed gets <em>lighter</em>, not darker (tonal inversion).
        </p>
        <div style={{ display: 'grid', gridTemplateColumns: '120px repeat(4, 1fr)', rowGap: sp[2], columnGap: sp[3], alignItems: 'center' }}>
          <div />
          {['lighter','light','main','dark'].map(s => <div key={s} style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, fontFamily: 'ui-monospace, monospace', textTransform: 'uppercase', letterSpacing: 0.5 }}>{s}</div>)}
          <div style={{ ...theme.typography.small, color: theme.tokens.text.secondary }}>Primary · light</div>
          {[50,300,500,700].map(k => <div key={k} style={{ height: 40, borderRadius: 6, background: window.M7Tokens.brand.purple[k], border: `1px solid ${theme.tokens.border.subtle}` }} title={`purple.${k}`} />)}
          <div style={{ ...theme.typography.small, color: theme.tokens.text.secondary }}>Primary · dark</div>
          {[900,200,300,100].map((k,i) => <div key={i} style={{ height: 40, borderRadius: 6, background: window.M7Tokens.brand.purple[k], border: `1px solid ${theme.tokens.border.subtle}` }} title={`purple.${k}`} />)}
          <div style={{ ...theme.typography.small, color: theme.tokens.text.secondary, marginTop: sp[2] }}>Tertiary · light</div>
          {[50,200,400,700].map(k => <div key={k} style={{ height: 40, borderRadius: 6, background: window.M7Tokens.brand.green[k], border: `1px solid ${theme.tokens.border.subtle}`, marginTop: sp[2] }} title={`green.${k}`} />)}
          <div style={{ ...theme.typography.small, color: theme.tokens.text.secondary }}>Tertiary · dark</div>
          {[900,600,300,100].map((k,i) => <div key={i} style={{ height: 40, borderRadius: 6, background: window.M7Tokens.brand.green[k], border: `1px solid ${theme.tokens.border.subtle}` }} title={`green.${k}`} />)}
        </div>
        <p style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, marginTop: sp[4], marginBottom: 0 }}>
          Toggle mode in the header to see it applied across every role (primary, secondary, tertiary, success, warning, error, info).
        </p>
      </Card>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: sp[6] }}>
        <Card theme={theme} padding={sp[5]}>
          <h4 style={{ ...theme.typography.h6, margin: 0, marginBottom: sp[3] }}>Surfaces</h4>
          {Object.entries(theme.tokens.surfaces).map(([k, v]) => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: sp[3], marginBottom: sp[2] }}>
              <div style={{ width: 40, height: 24, background: v, border: `1px solid ${theme.tokens.border.subtle}`, borderRadius: 4 }} />
              <div style={{ flex: 1 }}><TokenLabel name={k} value={v} theme={theme} /></div>
            </div>
          ))}
        </Card>
        <Card theme={theme} padding={sp[5]}>
          <h4 style={{ ...theme.typography.h6, margin: 0, marginBottom: sp[3] }}>Text</h4>
          {Object.entries(theme.tokens.text).map(([k, v]) => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: sp[3], marginBottom: sp[2] }}>
              <span style={{ ...theme.typography.body1bold, color: v, minWidth: 40 }}>Aa</span>
              <div style={{ flex: 1 }}><TokenLabel name={k} value={v} theme={theme} /></div>
            </div>
          ))}

            <li><b>Typography:</b> every variant has explicit size/weight/line-height/letter-spacing. Inter body, Inter Tight display.</li>
            <li><b>Spacing:</b> 4px base.</li>
            <li><b>Radius/Shadow:</b> explicit scales + trimmed 5-level shadow set.</li>
            <li><b>Motion:</b> duration + easing tokens mapped onto MUI transitions.</li>
            <li><b>Dark mode:</b> all tokens are mode-aware with light-shifting and tonal inversion.</li>
          </ul>
        </Card>
        <Card theme={theme} padding={sp[6]}>
          <h4 style={{ ...theme.typography.h5, margin: 0, marginBottom: sp[3] }}>Legacy → new alias map</h4>
          <p style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted, margin: `0 0 ${sp[3]}` }}>
            Replace these old token references in existing components:
          </p>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: sp[2] }}>
            {[
              ['colors.black', 'neutral[900]'],
              ['colors.darkGray', 'neutral[500] · text.muted'],
              ['colors.borderGrey', 'neutral[200] · border.default'],
              ['colors.lightGray', 'neutral[50] · surfaces.subtle'],
              ['colors.seaShell', 'neutral[100] · border.subtle'],
              ['colors.darkPurple', 'primary.main'],
              ['colors.lightPurple', 'primary.light'],
              ['colors.backgroundLightPurple', 'primary.lighter'],
              ['colors.successMain', 'success.main'],
              ['colors.redAlert', 'error.main'],
              ['colors.warning', 'warning.lighter'],
              ['colors.warningText', 'warning.contrastText'],
              ['colors.dayShift', 'shiftColors.day.bg'],
              ['colors.nightShift', 'shiftColors.night.bg'],
            ].map(([from, to]) => (
              <React.Fragment key={from}>
                <span style={{ ...theme.typography.xSmall, fontFamily: 'ui-monospace, monospace', color: theme.tokens.text.muted, textDecoration: 'line-through' }}>{from}</span>
                <span style={{ ...theme.typography.xSmall, fontFamily: 'ui-monospace, monospace', color: theme.tokens.text.primary }}>{to}</span>
              </React.Fragment>
            ))}
          </div>
        </Card>
      </div>

      <Card theme={theme} padding={0}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${sp[3]} ${sp[5]}`, borderBottom: `1px solid ${theme.tokens.border.subtle}`, background: theme.tokens.surfaces.subtle, borderTopLeftRadius: theme.tokens.radius.lg, borderTopRightRadius: theme.tokens.radius.lg }}>
          <div style={{ display: 'flex', gap: sp[3], alignItems: 'center' }}>
            <span style={{ ...theme.typography.smallBold, color: theme.tokens.text.primary, fontFamily: 'ui-monospace, monospace' }}>theme.ts</span>
            <Chip theme={theme} label={currentNeutralKey} size="small" color="primary" />
            <Chip theme={theme} label={theme.palette.mode} size="small" />
          </div>
          <Button theme={theme} variant="outlined" color="secondary" size="small" onClick={() => {
            navigator.clipboard.writeText(themeSnippet);
            setCopied(true);
            setTimeout(() => setCopied(false), 1400);
          }}>{copied ? 'Copied ✓' : 'Copy'}</Button>
        </div>
        <pre style={{ margin: 0, padding: sp[5], overflow: 'auto', maxHeight: 480,
          background: theme.tokens.neutrals[900], color: theme.tokens.neutrals[100],
          fontSize: 12, lineHeight: 1.55, fontFamily: 'ui-monospace, monospace',
          borderBottomLeftRadius: theme.tokens.radius.lg, borderBottomRightRadius: theme.tokens.radius.lg }}>{themeSnippet}</pre>
      </Card>
    </Section>
  );
}

Object.assign(window, { HandoffSection });
  </script>

  <!-- ═══════════════════════════════════════════════════════════════
       APP SHELL — Nav, Header, Hero, App root
       Source: project/tokens/app.jsx
       ═══════════════════════════════════════════════════════════════ -->
  <script type="text/babel">
const DEFAULTS = {
  "neutralKey": "brand-tinted",
  "shiftKey": "refined",
  "mode": "light"
};

function useThemeState() {
  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem('m7ds-settings');
      if (saved) return { ...DEFAULTS, ...JSON.parse(saved) };
    } catch {}
    return DEFAULTS;
  });
  useEffect(() => {
    try { localStorage.setItem('m7ds-settings', JSON.stringify(settings)); } catch {}
  }, [settings]);
  const theme = useMemo(() => window.M7ThemeBuilder.buildTheme(settings), [settings]);
  return { theme, settings, setSettings };
}

function Nav({ theme, activeId }) {
  const sp = theme.tokens.spacing;
  const groups = [
    { label: 'Foundations', items: [
      { id: 'color', label: 'Color' }, { id: 'type', label: 'Typography' },
      { id: 'spacing', label: 'Spacing · Radius · Shadow' }, { id: 'shift', label: 'Shift colors' },
    ]},
    { label: 'Components', items: [
      { id: 'components-buttons', label: 'Buttons' }, { id: 'components-inputs', label: 'Form controls' },
      { id: 'components-feedback', label: 'Feedback' }, { id: 'components-composite', label: 'Composed patterns' },
    ]},
    { label: 'Handoff', items: [{ id: 'handoff', label: 'theme.ts + migration' }] },
  ];
  return (
    <nav style={{ position: 'sticky', top: 64, alignSelf: 'flex-start', width: 240, padding: sp[5],
      borderRight: `1px solid ${theme.tokens.border.subtle}`, height: 'calc(100vh - 64px)', overflow: 'auto' }}>
      {groups.map(g => (
        <div key={g.label} style={{ marginBottom: sp[6] }}>
          <div style={{ ...theme.typography.overline, color: theme.tokens.text.muted, marginBottom: sp[2] }}>{g.label}</div>
          {g.items.map(it => (
            <a key={it.id} href={`#${it.id}`} style={{
              display: 'block', padding: `${sp[2]} ${sp[3]}`, borderRadius: theme.tokens.radius.sm,
              ...theme.typography.small,
              color: activeId === it.id ? theme.palette.primary.dark : theme.tokens.text.secondary,
              background: activeId === it.id ? theme.palette.primary.lighter : 'transparent',
              fontWeight: activeId === it.id ? 600 : 400, textDecoration: 'none', marginBottom: 2,
            }}>{it.label}</a>
          ))}
        </div>
      ))}
    </nav>
  );
}

function Header({ theme, mode, onModeChange }) {
  const sp = theme.tokens.spacing;
  const ToggleBtn = ({ value, children, title }) => {
    const active = mode === value;
    return (
      <button onClick={() => onModeChange(value)} title={title} aria-label={title} aria-pressed={active} style={{
        width: 32, height: 28, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        background: active ? theme.tokens.surfaces.panel : 'transparent',
        color: active ? theme.tokens.text.primary : theme.tokens.text.muted,
        border: 'none', borderRadius: theme.tokens.radius.sm,
        boxShadow: active ? theme.tokens.shadow.sm : 'none',
        cursor: 'pointer', padding: 0,
      }}>{children}</button>
    );
  };
  const SunIcon = (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>);
  const MoonIcon = (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>);
  return (
    <header style={{ position: 'sticky', top: 0, zIndex: 50, height: 64,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: `0 ${sp[6]}`,
      background: theme.tokens.surfaces.panel, borderBottom: `1px solid ${theme.tokens.border.subtle}` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: sp[3] }}>
        <div style={{ width: 28, height: 28, borderRadius: theme.tokens.radius.sm,
          background: theme.palette.primary.main, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: theme.typography.fontFamily, fontWeight: 700, fontSize: 14 }}>M7</div>
        <div>
          <div style={{ ...theme.typography.smallBold, color: theme.tokens.text.primary }}>Design System</div>
          <div style={{ ...theme.typography.xSmall, color: theme.tokens.text.muted }}>v1.1 · MUI v5</div>
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: sp[3] }}>
        <div style={{ display: 'inline-flex', gap: 2, padding: 2,
          background: theme.tokens.surfaces.subtle,
          border: `1px solid ${theme.tokens.border.subtle}`,
          borderRadius: theme.tokens.radius.sm }}>
          <ToggleBtn value="light" title="Light mode">{SunIcon}</ToggleBtn>
          <ToggleBtn value="dark" title="Dark mode">{MoonIcon}</ToggleBtn>
        </div>
        <Chip theme={theme} color="primary" variant="outlined" size="small" label="Prototype" />
      </div>
    </header>
  );
}

function Hero({ theme }) {
  const sp = theme.tokens.spacing;
  return (
    <section style={{ padding: `${sp[16]} ${sp[10]}`, borderBottom: `1px solid ${theme.tokens.border.subtle}`, background: theme.tokens.surfaces.canvas }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ ...theme.typography.overline, color: theme.palette.primary.main, marginBottom: sp[3] }}>M7 Design System · v1.1</div>
        <h1 style={{ ...theme.typography.displayMd, color: theme.tokens.text.primary, margin: 0, marginBottom: sp[4], maxWidth: 900 }}>
          A MUI-native component library, tuned to the M7 brand
        </h1>
        <p style={{ ...theme.typography.body1, color: theme.tokens.text.secondary, maxWidth: 720, margin: 0, marginBottom: sp[6] }}>
          Theming updates to our current MUI component library. Addresses gaps in current token conventions to align us closer to MUI standardization. The theme also expands brand color ranges and offers support for dark mode.
          <br /><br />
          Components are for theme previewing only, this is not intended to replace our Storybook implementation.
        </p>
        <div style={{ display: 'flex', gap: sp[3] }}>
          <Button theme={theme} variant="contained" endIcon={Icon.arrowRight()} onClick={() => window.open('https://github.com/dariniello/design-system', '_blank', 'noopener')}>View package</Button>
        </div>
      </div>
    </section>
  );
}

function App() {
  const { theme, settings, setSettings } = useThemeState();
  const [activeId, setActiveId] = useState('color');

  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && e.intersectionRatio > 0.3) setActiveId(e.target.id);
      });
    }, { rootMargin: '-80px 0px -60% 0px', threshold: [0, 0.3, 0.6] });
    document.querySelectorAll('section[id]').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  useEffect(() => {
    document.body.style.background = theme.tokens.surfaces.canvas;
    document.body.style.color = theme.tokens.text.primary;
  }, [theme]);

  return (
    <div style={{ minHeight: '100vh', background: theme.tokens.surfaces.canvas, color: theme.tokens.text.primary, fontFamily: theme.typography.fontFamily }}>
      <Header theme={theme} mode={settings.mode}
        onModeChange={(m) => setSettings({ ...settings, mode: m })}
      />
      <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr' }}>
        <Nav theme={theme} activeId={activeId} />
        <main>
          <Hero theme={theme} />
          <FoundationsColor theme={theme} />
          <FoundationsType theme={theme} />
          <FoundationsSpacing theme={theme} />
          <FoundationsShift theme={theme} />
          <ComponentsButtons theme={theme} />
          <ComponentsInputs theme={theme} />
          <ComponentsFeedback theme={theme} />
          <ComponentsComposite theme={theme} />
          <HandoffSection theme={theme} currentNeutralKey={settings.neutralKey} currentShiftKey={settings.shiftKey} />
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
